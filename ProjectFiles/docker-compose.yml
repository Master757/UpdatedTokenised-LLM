services:

  llm_backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cpp_llm_server
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./Backend/sessions:/app/sessions

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile.frontend
    container_name: node_frontend
    ports:
      - "5000:5000"
    environment:
      - LLM_HOST=llm_backend
    depends_on:
      - llm_backend